# =============================================================================
# cross-platform.yml — Validate OpenROAD-MCP across Ubuntu, macOS, Windows/WSL2
#
# Runs on: push to main, PRs, and weekly schedule
# =============================================================================

name: Cross-Platform Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Sunday at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

env:
  MCP_SERVER_REQUEST_TIMEOUT: 120
  MCP_REQUEST_MAX_TOTAL_TIMEOUT: 300

jobs:
  # ---------------------------------------------------------------------------
  # Ubuntu matrix (22.04 and 24.04)
  # ---------------------------------------------------------------------------
  ubuntu:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: make sync

      - name: Run core tests
        run: make test

      - name: Run tools tests
        run: make test-tools

      - name: Verify MCP server starts
        run: |
          timeout 10 uv run openroad-mcp --help || true
          echo "✅ MCP server CLI verified on ${{ matrix.os }}"

      - name: Docker build test
        run: |
          docker build -f Dockerfile -t openroad-mcp-test --target runtime . || \
            echo "⚠️ Docker build requires openroad/orfs base image"

  # ---------------------------------------------------------------------------
  # macOS (latest)
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: make sync

      - name: Run core tests
        run: make test

      - name: Run tools tests
        run: make test-tools

      - name: Verify MCP server starts
        run: |
          timeout 10 uv run openroad-mcp --help || true
          echo "✅ MCP server CLI verified on macOS"

      - name: Test PTY behavior on macOS
        run: |
          python3 -c "
          import pty, os
          master, slave = pty.openpty()
          os.write(master, b'test\n')
          os.close(master)
          os.close(slave)
          print('✅ PTY works on macOS')
          "

  # ---------------------------------------------------------------------------
  # Windows with WSL2
  # ---------------------------------------------------------------------------
  windows-wsl2:
    runs-on: windows-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable WSL2
        shell: powershell
        run: wsl --install -d Ubuntu-24.04 --no-launch

      - name: Setup WSL2 environment
        shell: powershell
        run: |
          wsl -d Ubuntu-24.04 -- bash -lc "sudo apt-get update && sudo apt-get install -y python3 python3-pip python3-venv curl && curl -LsSf https://astral.sh/uv/install.sh | sh"

      - name: Run tests in WSL2
        shell: powershell
        run: |
          $winPath = ("${{ github.workspace }}" -replace '\\','/')
          $wslWorkspace = wsl -d Ubuntu-24.04 -- wslpath -a "$winPath"
          $script = @"
          #!/bin/bash
          export HOME=/root
          source "`$HOME/.local/bin/env" 2>/dev/null || true
          export PATH="`$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:`$PATH"
          cd '$wslWorkspace'
          uv sync --all-extras --inexact
          uv run pytest --ignore=tests/interactive --ignore=tests/performance --ignore=tests/integration -v
          "@
          $script | Out-File -Encoding ascii -FilePath "${{ github.workspace }}\run_tests.sh"
          wsl -d Ubuntu-24.04 -- bash -c "sed -i 's/\r$//' '$wslWorkspace/run_tests.sh' && bash '$wslWorkspace/run_tests.sh'"

      - name: Check Docker availability in WSL2
        shell: powershell
        run: |
          wsl -d Ubuntu-24.04 -- bash -c "command -v docker && docker --version || echo 'Docker not available in WSL2 (requires Docker Desktop)'"

  # ---------------------------------------------------------------------------
  # Summary job — gates merge
  # ---------------------------------------------------------------------------
  cross-platform-summary:
    runs-on: ubuntu-latest
    needs: [ubuntu, macos, windows-wsl2]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Ubuntu: ${{ needs.ubuntu.result }}"
          echo "macOS: ${{ needs.macos.result }}"
          echo "Windows/WSL2: ${{ needs.windows-wsl2.result }}"
          if [ "${{ needs.ubuntu.result }}" = "failure" ]; then
            echo "❌ Ubuntu tests failed"
            exit 1
          fi
          if [ "${{ needs.macos.result }}" = "failure" ]; then
            echo "❌ macOS tests failed"
            exit 1
          fi
          # WSL2 is best-effort — don't block on it
          if [ "${{ needs.windows-wsl2.result }}" = "failure" ]; then
            echo "⚠️ Windows/WSL2 tests failed (non-blocking)"
          fi
          echo "✅ Cross-platform validation complete"
