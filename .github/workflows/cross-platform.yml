# =============================================================================
# cross-platform.yml — Validate OpenROAD-MCP across Ubuntu and macOS
#
# Runs on: push to main, PRs, and weekly schedule
#
# PURPOSE: Validate platform-specific setup, server startup, and Docker builds
# NOTE:
#   - Unit tests are run in ci.yaml, not here. Avoid duplicating tests.
#   - Windows/WSL2 requires Docker Desktop. Not tested in CI.
#     See setup-wsl2.ps1 for local development setup.
# =============================================================================

name: Cross-Platform Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly: Sunday at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

env:
  MCP_SERVER_REQUEST_TIMEOUT: 120
  MCP_REQUEST_MAX_TOTAL_TIMEOUT: 300

jobs:
  # ---------------------------------------------------------------------------
  # Ubuntu matrix (22.04 and 24.04)
  # ---------------------------------------------------------------------------
  ubuntu:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ubuntu setup script
        run: bash scripts/setup-ubuntu.sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify MCP server starts
        run: |
          timeout 10 uv run openroad-mcp --help || true
          echo "✅ MCP server CLI verified on ${{ matrix.os }}"

      - name: Test Docker build (test image)
        run: |
          docker build -f Dockerfile.test -t openroad-mcp-test .
          docker run --rm openroad-mcp-test uv run pytest tests/tools tests/integration -v

  # ---------------------------------------------------------------------------
  # macOS (latest)
  # ---------------------------------------------------------------------------
  macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run macOS setup script
        run: bash scripts/setup-macos.sh

      - name: Add uv to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify MCP server starts (post-setup)
        run: |
          source .venv/bin/activate
          timeout 10 openroad-mcp --help || true
          echo "✅ MCP server CLI verified post-setup"

      - name: Test MCP PTY behavior on macOS
        run: |
          uv run python3 << 'EOF'
          import sys
          import asyncio
          from openroad_mcp.interactive.pty_handler import PTYHandler
          
          async def test_pty():
              """Test PTY handler with actual command execution."""
              try:
                  handler = PTYHandler()
                  print("✅ PTY handler initialized successfully on macOS")
                  
                  # Create a session with a simple command
                  await handler.create_session(["sh", "-c", "echo 'MCP PTY test'"])
                  
                  # Read output from the PTY
                  output = await handler.read_output(size=1024)
                  if output:
                      print("✅ PTY command execution works on macOS")
                      print(f"   Output: {output.decode(errors='ignore')[:50]}...")
                  else:
                      print("⚠️ PTY output was empty")
                      sys.exit(1)
                      
                  # Cleanup
                  await handler.cleanup()
                  print("✅ Platform-specific PTY support validated")
                  
              except Exception as e:
                  print(f"❌ PTY test failed: {e}")
                  sys.exit(1)
          
          asyncio.run(test_pty())
          EOF

  # ---------------------------------------------------------------------------
  # Summary job — gates merge
  # ---------------------------------------------------------------------------
  cross-platform-summary:
    runs-on: ubuntu-latest
    needs: [ubuntu, macos]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Ubuntu: ${{ needs.ubuntu.result }}"
          echo "macOS: ${{ needs.macos.result }}"
          if [ "${{ needs.ubuntu.result }}" = "failure" ]; then
            echo "❌ Ubuntu tests failed"
            exit 1
          fi
          if [ "${{ needs.macos.result }}" = "failure" ]; then
            echo "❌ macOS tests failed"
            exit 1
          fi
          echo "✅ Cross-platform validation complete"
