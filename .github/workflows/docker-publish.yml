name: Publish Docker Image to GHCR

on:
  workflow_call:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_TAG: ${{ inputs.image_tag || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            make build ORFS_VERSION="$IMAGE_TAG"
          else
            make build
          fi

      - name: Push Docker image
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            docker push ghcr.io/luarss/openroad-mcp:"$IMAGE_TAG"
          else
            docker push ghcr.io/luarss/openroad-mcp:$(make --no-print-directory print-ORFS_VERSION)
          fi
