name: Publish Docker Image to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: make sync

      - name: Run tests
        run: make test

      - name: Run checks
        run: make check

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: make build

      - name: Push Docker image
        run: docker push ghcr.io/luarss/openroad-mcp:$(make --no-print-directory print-ORFS_VERSION)
