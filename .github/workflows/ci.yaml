name: CI
# =============================================================================
# ci.yaml — Run all unit tests, linting, and coverage analysis
#
# Runs on: push to main, PRs, and daily schedule
#
# PURPOSE: Execute comprehensive test suite (lint, core, interactive,
#          integration, tools, performance) and upload coverage reports
# NOTE: Platform-specific validation is in cross-platform.yml
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  MCP_SERVER_REQUEST_TIMEOUT: 120
  MCP_REQUEST_MAX_TOTAL_TIMEOUT: 300

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        test-type: [lint, core, interactive, integration, tools]

    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync

    - name: Run linting and tests
      run: |
        if [ "${{ matrix.test-type }}" = "lint" ]; then
          make check
        elif [ "${{ matrix.test-type }}" = "core" ]; then
          make test
        elif [ "${{ matrix.test-type }}" = "interactive" ]; then
          make test-interactive
        elif [ "${{ matrix.test-type }}" = "integration" ]; then
          make test-integration
        elif [ "${{ matrix.test-type }}" = "tools" ]; then
          make test-tools
        fi

  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync
    - run: make test-performance

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/setup-uv@v6
    - run: make sync
    - run: make test-coverage
    - uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
